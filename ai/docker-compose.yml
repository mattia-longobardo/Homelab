services:

# Minio # --------------------------------------------------------------------------------------------------------------
  minio:
    image: pgsty/minio:latest
    container_name: minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./minio:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    mem_limit: 1g
    cpus: "1.0"
    networks:
      - proxy_public
      - ai_internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy_public"
      - "traefik.http.routers.minio-router.rule=Host(`minio.local`)"
      - "traefik.http.routers.minio-router.entrypoints=web"
      - "traefik.http.services.minio-service.loadbalancer.server.port=9001"

# Langfuse # --------------------------------------------------------------------------------------------------------------

  langfuse-redis:
    image: redis:7
    container_name: langfuse-redis
    command: >
      redis-server
      --requirepass ${LANGFUSE_REDIS_PASSWORD}
      --maxmemory-policy noeviction
    volumes:
      - ./langfuse/redis:/data
    restart: unless-stopped
    mem_limit: 512m
    cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${LANGFUSE_REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 3s
      timeout: 10s
      retries: 10
    networks:
      - langfuse_internal

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: langfuse-clickhouse
    user: root
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD}
    volumes:
      - ./langfuse/clickhouse/data:/var/lib/clickhouse
      - ./langfuse/clickhouse/logs:/var/log/clickhouse-server
    restart: unless-stopped
    mem_limit: 6g
    cpus: "4.0"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 1s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy_public"
      - "traefik.http.routers.langfuse-clickhouse-router.rule=Host(`${LANGFUSE_CLICKHOUSE_LOCAL_HOST}`)"
      - "traefik.http.routers.langfuse-clickhouse-router.entrypoints=web"
      - "traefik.http.services.langfuse-clickhouse-service.loadbalancer.server.port=8123"
    networks:
      - proxy_public
      - langfuse_internal

  langfuse-minio:
    image: cgr.dev/chainguard/minio
    container_name: langfuse-minio
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: ${LANGFUSE_MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${LANGFUSE_MINIO_ROOT_PASSWORD}
    volumes:
      - ./langfuse/minio:/data
    restart: unless-stopped
    mem_limit: 1g
    cpus: "1.0"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 1s
      timeout: 5s
      retries: 5
      start_period: 1s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy_public"
      - "traefik.http.routers.langfuse-s3-router.rule=Host(`${LANGFUSE_S3_HOST}`)"
      - "traefik.http.routers.langfuse-s3-router.entrypoints=web"
      - "traefik.http.routers.langfuse-s3-router.service=langfuse-s3-service"
      - "traefik.http.services.langfuse-s3-service.loadbalancer.server.port=9000"
      - "traefik.http.routers.langfuse-minio-router.rule=Host(`${LANGFUSE_MINIO_LOCAL_HOST}`)"
      - "traefik.http.routers.langfuse-minio-router.entrypoints=web"
      - "traefik.http.routers.langfuse-minio-router.service=langfuse-minio-service"
      - "traefik.http.services.langfuse-minio-service.loadbalancer.server.port=9001"
    networks:
      - proxy_public
      - langfuse_internal

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: langfuse-worker
    depends_on:
      - langfuse-redis
      - langfuse-clickhouse
      - langfuse-minio
    environment:
      NEXTAUTH_URL: https://${LANGFUSE_HOST}
      DATABASE_URL: postgresql://langfuse:${DB_LANGFUSE_PASSWORD}@postgres:5432/langfuse
      SALT: ${LANGFUSE_SALT}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
      TELEMETRY_ENABLED: true
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: false
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD}
      CLICKHOUSE_CLUSTER_ENABLED: false
      LANGFUSE_USE_AZURE_BLOB: false
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_MINIO_ROOT_USER}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: true
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_MINIO_ROOT_USER}
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://${LANGFUSE_S3_HOST}
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: true
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
      LANGFUSE_S3_BATCH_EXPORT_ENABLED: false
      LANGFUSE_S3_BATCH_EXPORT_BUCKET: langfuse
      LANGFUSE_S3_BATCH_EXPORT_PREFIX: exports/
      LANGFUSE_S3_BATCH_EXPORT_REGION: auto
      LANGFUSE_S3_BATCH_EXPORT_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_BATCH_EXPORT_EXTERNAL_ENDPOINT: http://${LANGFUSE_S3_HOST}
      LANGFUSE_S3_BATCH_EXPORT_ACCESS_KEY_ID: ${LANGFUSE_MINIO_ROOT_USER}
      LANGFUSE_S3_BATCH_EXPORT_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_BATCH_EXPORT_FORCE_PATH_STYLE: true
      REDIS_HOST: langfuse-redis
      REDIS_PORT: 6379
      REDIS_AUTH: ${LANGFUSE_REDIS_PASSWORD}
      REDIS_TLS_ENABLED: false
    restart: unless-stopped
    mem_limit: 2g
    cpus: "2.0"
    networks:
      - db_internal
      - langfuse_internal

  langfuse:
    image: langfuse/langfuse:3
    container_name: langfuse
    depends_on:
      - langfuse-worker
      - langfuse-redis
      - langfuse-clickhouse
      - langfuse-minio
    environment:
      HOSTNAME: 0.0.0.0
      NEXTAUTH_URL: https://${LANGFUSE_HOST}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      AUTH_DISABLE_SIGNUP: ${LANGFUSE_AUTH_DISABLE_SIGNUP}
      DATABASE_URL: postgresql://langfuse:${DB_LANGFUSE_PASSWORD}@postgres:5432/langfuse
      SALT: ${LANGFUSE_SALT}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
      TELEMETRY_ENABLED: true
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: false
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD}
      CLICKHOUSE_CLUSTER_ENABLED: false
      LANGFUSE_USE_AZURE_BLOB: false
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_MINIO_ROOT_USER}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: true
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_MINIO_ROOT_USER}
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://${LANGFUSE_S3_HOST}
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: true
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
      LANGFUSE_S3_BATCH_EXPORT_ENABLED: false
      LANGFUSE_S3_BATCH_EXPORT_BUCKET: langfuse
      LANGFUSE_S3_BATCH_EXPORT_PREFIX: exports/
      LANGFUSE_S3_BATCH_EXPORT_REGION: auto
      LANGFUSE_S3_BATCH_EXPORT_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_BATCH_EXPORT_EXTERNAL_ENDPOINT: http://${LANGFUSE_S3_HOST}
      LANGFUSE_S3_BATCH_EXPORT_ACCESS_KEY_ID: ${LANGFUSE_MINIO_ROOT_USER}
      LANGFUSE_S3_BATCH_EXPORT_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_BATCH_EXPORT_FORCE_PATH_STYLE: true
      REDIS_HOST: langfuse-redis
      REDIS_PORT: 6379
      REDIS_AUTH: ${LANGFUSE_REDIS_PASSWORD}
      REDIS_TLS_ENABLED: false
    restart: unless-stopped
    mem_limit: 2g
    cpus: "2.0"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy_public"
      - "traefik.http.routers.langfuse-router.rule=Host(`${LANGFUSE_HOST}`)"
      - "traefik.http.routers.langfuse-router.entrypoints=web"
      - "traefik.http.services.langfuse-service.loadbalancer.server.port=3000"
    networks:
      - proxy_public
      - db_internal
      - langfuse_internal

# n8n # --------------------------------------------------------------------------------------------------------------

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    environment:
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_HOST=${SUBDOMAIN}.${DOMAIN_NAME}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - WEBHOOK_URL=https://${SUBDOMAIN}.${DOMAIN_NAME}/
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
      - TZ=${GENERIC_TIMEZONE}
      - N8N_TRUST_PROXY=true
      - N8N_PROXY_HOPS=2
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${DB_N8N_PASSWORD}
      - N8N_RUNNERS_MODE=external
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN}
      - N8N_NATIVE_PYTHON_RUNNER=true
      - N8N_LICENSE_ACTIVATION_KEY=${N8N_LICENSE_KEY}
    volumes:
      - ./n8n:/home/node/.n8n
      - ./n8n-local:/files
    restart: unless-stopped
    mem_limit: 2g
    cpus: "2.0"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy_public"
      - "traefik.http.routers.n8n-router.rule=Host(`n8n.example.com`)"
      - "traefik.http.routers.n8n-router.entrypoints=web"
      - "traefik.http.services.n8n-service.loadbalancer.server.port=5678"
    networks:
      - proxy_public
      - ai_internal
      - db_internal

  task-runners:
    image: n8nio/runners:latest
    container_name: n8n-runners
    depends_on:
      - n8n
    environment:
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN}
      - N8N_RUNNERS_AUTO_SHUTDOWN_TIMEOUT=15
    restart: unless-stopped
    mem_limit: 1g
    cpus: "2.0"
    networks:
      - ai_internal
      - db_internal

networks:
  proxy_public:
    external: true
  ai_internal:
    external: true
  db_internal:
    external: true
  langfuse_internal:
    name: langfuse_internal
    internal: true
