services:

# Proxy Service # --------------------------------------------------------------------------------------------------------------

  traefik:
    image: traefik:latest
    container_name: traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.metrics.address=:8082"
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.entrypoint=metrics"
      - "--metrics.prometheus.addEntryPointsLabels=true"
      - "--metrics.prometheus.addServicesLabels=true"
    ports:
      - "80:80"
      - "443:443"
    restart: always
    mem_limit: 512m
    cpus: "0.75"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/dynamic:/etc/traefik/dynamic
    networks:
      - proxy_public
      - metrics_internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy_public"
      - "traefik.http.routers.traefik-router.rule=Host(`proxy.local`)"
      - "traefik.http.routers.traefik-router.entrypoints=web"
      - "traefik.http.routers.traefik-router.service=traefik-service"
      - "traefik.http.services.traefik-service.loadbalancer.server.port=8080"

# Cloudflare Tunnel # --------------------------------------------------------------------------------------------------------------

  cloudflare:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare
    network_mode: host
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    command: tunnel --config /etc/cloudflared/config.yml run
    restart: always
    mem_limit: 256m
    cpus: "0.5"
  # Pi-hole # --------------------------------------------------------------------------------------------------------------

  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    network_mode: host
    environment:
      TZ: 'Europe/Rome'
      FTLCONF_webserver_api_password: ${PIHOLE_PASSWORD}
      # If using Docker's default `bridge` network setting the dns listening mode should be set to 'ALL'
      FTLCONF_webserver_port: 1000
      FTLCONF_dns_listeningMode: 'ALL'
      FTLCONF_dns_upstreams: '1.1.1.1;1.0.0.1'
      FTLCONF_dns_cache_size: 10000
      # Wildcard: every *.local host -> Traefik box (192.168.1.220).
      # router.local kept on the gateway. Semicolon-separated = v6 array.
      FTLCONF_misc_dnsmasq_lines: 'address=/local/192.168.1.220;address=/router.local/192.168.1.1'
    volumes:
      # For persisting Pi-hole's databases and common configuration file
      - './pihole:/etc/pihole'
      # Uncomment the below if you have custom dnsmasq config files that you want to persist. Not needed for most starting fresh with Pi-hole v6. If you're upgrading from v5 you and have used this directory before, you should keep it enabled for the first v6 container start to allow for a complete migration. It can be removed afterwards. Needs environment variable FTLCONF_misc_etc_dnsmasq_d: 'true'
      #- './etc-dnsmasq.d:/etc/dnsmasq.d'
    cap_add:
      # See https://github.com/pi-hole/docker-pi-hole#note-on-capabilities
      # Optional, if Pi-hole should get some more processing time
      - SYS_NICE
      - NET_ADMIN
    restart: always
    mem_limit: 512m
    cpus: "1.0"

# Healing Docker # --------------------------------------------------------------------------------------------------------------

  autoheal:
    image: 'willfarrell/autoheal:latest'
    container_name: autoheal
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=60
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock:ro'
    restart: unless-stopped
    mem_limit: 128m
    cpus: "0.25"
    networks:
      - proxy_public

  watchtower:
    image: nickfedor/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=21600
      - TZ=Europe/Rome
    restart: unless-stopped
    mem_limit: 256m
    cpus: "0.5"

# Error Pages # --------------------------------------------------------------------------------------------------------------

  error-pages:
    image: nginx:alpine
    container_name: error-pages
    volumes:
      - ./error-pages/404.html:/usr/share/nginx/html/404.html:ro
      - ./error-pages/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    mem_limit: 64m
    cpus: "0.1"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy_public"
      # Catch-all router: lowest priority (1), matches every host and path.
      # Any higher-priority router defined elsewhere wins; this is the final fallback.
      - "traefik.http.routers.error-pages-catchall.rule=HostRegexp(`.+`)"
      - "traefik.http.routers.error-pages-catchall.entrypoints=web"
      - "traefik.http.routers.error-pages-catchall.priority=1"
      - "traefik.http.routers.error-pages-catchall.middlewares=error-pages-middleware@file"
      - "traefik.http.routers.error-pages-catchall.service=error-pages-catchall-svc"
      - "traefik.http.services.error-pages-catchall-svc.loadbalancer.server.port=80"
    networks:
      - proxy_public

networks:
  proxy_public:
    external: true
  metrics_internal:
    external: true
