x-solidtime-env: &solidtime-env
  APP_NAME: solidtime
  VITE_APP_NAME: solidtime
  APP_ENV: production
  APP_DEBUG: "false"
  APP_URL: ${SOLIDTIME_APP_URL}
  APP_FORCE_HTTPS: "true"
  TRUSTED_PROXIES: "*"
  APP_ENABLE_REGISTRATION: "false"
  APP_KEY: ${SOLIDTIME_APP_KEY}
  PASSPORT_PRIVATE_KEY: ${SOLIDTIME_PASSPORT_PRIVATE_KEY}
  PASSPORT_PUBLIC_KEY: ${SOLIDTIME_PASSPORT_PUBLIC_KEY}
  SUPER_ADMINS: ${SOLIDTIME_SUPER_ADMINS}
  LOG_CHANNEL: stderr_daily
  LOG_LEVEL: debug
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_DATABASE: solidtime
  DB_USERNAME: solidtime
  DB_PASSWORD: ${DB_SOLIDTIME_PASSWORD}
  MAIL_MAILER: log
  QUEUE_CONNECTION: database
  FILESYSTEM_DISK: local
  PUBLIC_FILESYSTEM_DISK: public
  GOTENBERG_URL: http://gotenberg:3000

services:

# Bytestash # --------------------------------------------------------------------------------------------------------------
  bytestash:
    image: "ghcr.io/jordan-dalby/bytestash:latest"
    container_name: bytestash
    restart: unless-stopped
    mem_limit: 512m
    cpus: "0.5"
    volumes:
      - ./bytestash:/data/snippets
    environment:
      BASE_PATH: ""
      JWT_SECRET: REDACTED
      TOKEN_EXPIRY: 24h
      ALLOW_NEW_ACCOUNTS: "true"
      DEBUG: "true"
      DISABLE_ACCOUNTS: "false"
      DISABLE_INTERNAL_ACCOUNTS: "false"
      OIDC_ENABLED: "false"
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.bytestash-router.rule=Host(`code.example.com`)'
      - 'traefik.http.routers.bytestash-router.entrypoints=web'
      - 'traefik.http.services.bytestash-service.loadbalancer.server.port=5000'
    networks:
      - proxy_public

# Frigate # --------------------------------------------------------------------------------------------------------------

  frigate:
    container_name: frigate
    stop_grace_period: 20s
    image: ghcr.io/blakeblackshear/frigate:stable
    shm_size: "512mb" # update for your cameras based on calculation above
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./frigate/config:/config
      - ./frigate/storage:/media/frigate
      - type: tmpfs # Optional: 1GB of memory, reduces SSD/SD Card wear
        target: /tmp/cache
        tmpfs:
          size: 1000000000
    ports:
      - "8554:8554" # RTSP feeds
      - "8555:8555/tcp" # WebRTC over tcp
      - "8555:8555/udp" # WebRTC over udp
    restart: unless-stopped
    mem_limit: 6g
    cpus: "4.0"
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.frigate-router.rule=Host(`cam.local`)'
      - 'traefik.http.routers.frigate-router.entrypoints=web'
      - 'traefik.http.services.frigate-service.loadbalancer.server.port=5000'
    networks:
      - proxy_public

# Paperless # --------------------------------------------------------------------------------------------------------------

  paperless-redis:
    image: redis:latest
    container_name: paperless-redis
    volumes:
      - ./paperless-redis:/data
    restart: unless-stopped
    mem_limit: 512m
    cpus: "0.5"
    command: redis-server --requirepass ${DB_PAPERLESS_PASSWORD}
    networks:
      - paperless_internal

  paperless-ngx:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless-ngx
    depends_on:
      - paperless-redis
    volumes:
      - ./paperless-ngx/data:/usr/src/paperless/data
      - ./paperless-ngx/media:/usr/src/paperless/media
      - ./paperless-ngx/export:/usr/src/paperless/export
      - ./paperless-ngx/consume:/usr/src/paperless/consume
    environment:
      PAPERLESS_REDIS: redis://:${DB_PAPERLESS_PASSWORD}@paperless-redis:6379
      PAPERLESS_DBHOST: postgres
      PAPERLESS_DBPASS: ${DB_PAPERLESS_PASSWORD}
      PAPERLESS_SECRET_KEY: ${SECRET_KEY}
      PAPERLESS_URL: https://docs.example.com
      PAPERLESS_CSRF_TRUSTED_ORIGINS: https://docs.example.com
      PAPERLESS_ALLOWED_HOSTS: docs.example.com, localhost
      PAPERLESS_CORS_ALLOWED_ORIGINS: https://docs.example.com
      PAPERLESS_PROXY_HEADERS: "true"
      PAPERLESS_USE_X_FORWARD_HOST: "true"
      PAPERLESS_USE_X_FORWARD_PORT: "true"
      PAPERLESS_PROXY_SSL_HEADER: '["HTTP_X_FORWARDED_PROTO", "https"]'
    restart: unless-stopped
    mem_limit: 2g
    cpus: "2.0"
    labels:
      - traefik.enable=true
      - traefik.http.routers.paperless.rule=Host(`docs.example.com`)
      - traefik.http.routers.paperless.entrypoints=web
      - "traefik.docker.network=proxy_public"
      - traefik.http.services.paperless.loadbalancer.server.port=8000
      - traefik.http.middlewares.paperless-forward.headers.customrequestheaders.X-Forwarded-Proto=https
      - traefik.http.routers.paperless.middlewares=paperless-forward
    networks:
      - proxy_public
      - db_internal
      - paperless_internal

# Seafile # --------------------------------------------------------------------------------------------------------------

  db:
    image: mariadb:10.11
    container_name: seafile-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_SEAFILE_PASSWORD}  # Required, set the root's password of MySQL service.
      - MYSQL_LOG_CONSOLE=true
      - MARIADB_AUTO_UPGRADE=1
    volumes:
      - /home/mattia/storage/seafile/seafile-mysql/db:/var/lib/mysql  # Required, specifies the path to MySQL data persistent store.
    restart: unless-stopped
    mem_limit: 2g
    cpus: "2.0"
    networks:
      - seafile_internal

  memcached:
    image: memcached:1.6.18
    container_name: seafile-memcached
    entrypoint: memcached -m 256
    restart: unless-stopped
    mem_limit: 384m
    cpus: "0.5"
    networks:
      - seafile_internal
          
  seafile:
    image: seafileltd/seafile-mc:11.0-latest
    container_name: seafile
    volumes:
      - /home/mattia/storage/seafile/seafile-data:/shared   # Required, specifies the path to Seafile data persistent store.
    tmpfs:
      - /opt/seafile/pids:mode=1777
    environment:
      - NON_ROOT=true  # Run server as the 'seafile' user (uid 8000) instead of root; /shared must be owned by 8000:8000.
      - DB_HOST=db
      - DB_ROOT_PASSWD=${DB_SEAFILE_PASSWORD}  # Required, the value should be root's password of MySQL service.
      - TIME_ZONE=Europe/Rome  # Optional, default is UTC. Should be uncomment and set to your local time zone.
      - SEAFILE_ADMIN_EMAIL=${SEAFILE_ADMIN_EMAIL} # Specifies Seafile admin user, default is 'me@example.com'.
      - SEAFILE_ADMIN_PASSWORD=${SEAFILE_ADMIN_PASSWORD}     # Specifies Seafile admin password, default is 'asecret'.
      - SEAFILE_SERVER_LETSENCRYPT=false
      - SEAFILE_SERVER_HOSTNAME=${SEAFILE_SERVER_HOSTNAME}
    depends_on:
      - db
      - memcached
    restart: unless-stopped
    mem_limit: 3g
    cpus: "2.0"
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=proxy_public'
      - 'traefik.http.routers.seafile-router.rule=Host(`cloud.example.com`)'
      - 'traefik.http.routers.seafile-router.entrypoints=web'
      - 'traefik.http.services.seafile-service.loadbalancer.server.port=80'
    networks:
      - proxy_public
      - seafile_internal

# Teable # --------------------------------------------------------------------------------------------------------------

  teable-redis:
    image: redis:latest
    container_name: teable-redis
    volumes:
      - ./teable-redis:/data
    restart: unless-stopped
    mem_limit: 512m
    cpus: "0.5"
    command: redis-server --requirepass ${DB_TEABLE_PASSWORD}
    networks:
      - teable_internal

  teable:
    image: ghcr.io/teableio/teable:latest
    container_name: teable
    depends_on:
      - teable-redis
    volumes:
      - ./teable:/app/.assets:rw
    environment:
      # --- Basic Configuration ---
      - NEXT_ENV_IMAGES_ALL_REMOTE=true
      - POSTGRES_PASSWORD=${DB_TEABLE_PASSWORD}
      - REDIS_PASSWORD=${DB_TEABLE_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - PUBLIC_ORIGIN=https://db.example.com

      # --- Postgres Configuration ---
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=teable
      - POSTGRES_USER=teable
      
      # --- Redis Configuration ---
      - REDIS_HOST=teable-redis
      - REDIS_PORT=6379
      - REDIS_DB=0

      # --- App / Connection Strings (MUST BE MANUALLY EXPANDED) ---
      
      # Format: postgresql://USER:PASSWORD@HOST:PORT/DB
      - PRISMA_DATABASE_URL=postgresql://teable:${DB_TEABLE_PASSWORD}@postgres:5432/teable
      - BACKEND_CACHE_PROVIDER=redis
      - BACKEND_CACHE_REDIS_URI=redis://default:${DB_TEABLE_PASSWORD}@teable-redis:6379/0
    restart: unless-stopped
    mem_limit: 3g
    cpus: "2.0"
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=proxy_public'
      - 'traefik.http.routers.teable-router.rule=Host(`db.example.com`)'
      - 'traefik.http.routers.teable-router.entrypoints=web'
      - 'traefik.http.middlewares.teable-headers.headers.customrequestheaders.Host=db.example.com'
      - 'traefik.http.routers.teable-router.middlewares=teable-headers'
      - 'traefik.http.services.teable-service.loadbalancer.server.port=3000'
    networks:
      - proxy_public
      - db_internal
      - teable_internal

# Solidtime # ---------------------------------------------------------------------------------------------------------

  solidtime:
    restart: unless-stopped
    mem_limit: 1536m
    cpus: "1.5"
    image: "solidtime/solidtime:${SOLIDTIME_IMAGE_TAG:-latest}"
    container_name: solidtime
    user: "1000:1000"
    volumes:
      - "./solidtime/app-storage:/var/www/html/storage"
      - "./solidtime/logs:/var/www/html/storage/logs"
      - "./solidtime/app-storage:/var/www/html/storage/app"
    environment:
      <<: *solidtime-env
      CONTAINER_MODE: http
      AUTO_DB_MIGRATE: "true"
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8000/health-check/up" ]
    networks:
      - proxy_public
      - db_internal
      - solidtime_internal
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=proxy_public'
      - 'traefik.http.routers.solidtime-router.rule=Host(`time.example.com`)'
      - 'traefik.http.routers.solidtime-router.entrypoints=web'
      - 'traefik.http.services.solidtime-service.loadbalancer.server.port=8000'
      - 'traefik.http.middlewares.sslheader.headers.customrequestheaders.X-Forwarded-Proto=https'
      - 'traefik.http.routers.solidtime-router.middlewares=sslheader'


  solidtime-scheduler:
    restart: unless-stopped
    mem_limit: 512m
    cpus: "0.5"
    image: "solidtime/solidtime:${SOLIDTIME_IMAGE_TAG:-latest}"
    container_name: solidtime-scheduler
    user: "1000:1000"
    volumes:
      - "./solidtime/app-storage:/var/www/html/storage"
      - "./solidtime/logs:/var/www/html/storage/logs"
      - "./solidtime/app-storage:/var/www/html/storage/app"
    environment:
      <<: *solidtime-env
      CONTAINER_MODE: scheduler
    healthcheck:
      test: [ "CMD", "healthcheck" ]
    networks:
      - db_internal
      - solidtime_internal

  solidtime-queue:
    restart: unless-stopped
    mem_limit: 1g
    cpus: "1.0"
    image: "solidtime/solidtime:${SOLIDTIME_IMAGE_TAG:-latest}"
    container_name: solidtime-queue
    user: "1000:1000"
    volumes:
      - "./solidtime/app-storage:/var/www/html/storage"
      - "./solidtime/logs:/var/www/html/storage/logs"
      - "./solidtime/app-storage:/var/www/html/storage/app"
    environment:
      <<: *solidtime-env
      CONTAINER_MODE: worker
      WORKER_COMMAND: "php /var/www/html/artisan queue:work"
    healthcheck:
      test: [ "CMD", "healthcheck" ]
    networks:
      - db_internal
      - solidtime_internal

# OpenProject # --------------------------------------------------------------------------------------------------------------

  openproject:
    image: openproject/openproject:15
    container_name: openproject
    environment:
      OPENPROJECT_HTTPS: "true"
      OPENPROJECT_HOST__NAME: ${OPENPROJECT_HOST}
      OPENPROJECT_RAILS__RELATIVE__URL__ROOT: ""
      OPENPROJECT_SECRET__KEY__BASE: ${OPENPROJECT_SECRET_KEY_BASE}
      OPENPROJECT_SEED__ADMIN__USER__PASSWORD: ${OPENPROJECT_ADMIN_PASSWORD}
      OPENPROJECT_SEED__ADMIN__USER__PASSWORD__RESET: "false"
      DATABASE_URL: postgres://openproject:${DB_OPENPROJECT_PASSWORD}@postgres:5432/openproject
      RAILS_MIN_THREADS: "4"
      RAILS_MAX_THREADS: "16"
      TZ: Europe/Rome
    volumes:
      - ./openproject/assets:/var/openproject/assets
    restart: unless-stopped
    mem_limit: 4g
    cpus: "2.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health_checks/default"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy_public"
      - "traefik.http.routers.openproject-router.rule=Host(`${OPENPROJECT_HOST}`)"
      - "traefik.http.routers.openproject-router.entrypoints=web"
      - "traefik.http.services.openproject-service.loadbalancer.server.port=8080"
      - "traefik.http.middlewares.openproject-https.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.openproject-router.middlewares=openproject-https"
    networks:
      - proxy_public
      - db_internal

# Gotenberg # ---------------------------------------------------------------------------------------------------------

  gotenberg:
    image: gotenberg/gotenberg:latest
    container_name: gotenberg
    environment:
      - GOTENBERG_LOG_LEVEL=info
      - GOTENBERG_DISABLE_GOOGLE_CHROME=false
      - GOTENBERG_DISABLE_LIBREOFFICE=false
    restart: unless-stopped
    mem_limit: 3g
    cpus: "2.0"
    networks:
      - proxy_public

networks:
  proxy_public:
    external: true
  db_internal:
    external: true
  paperless_internal:
    name: paperless_internal
    internal: true
  seafile_internal:
    name: seafile_internal
  solidtime_internal:
    name: solidtime_internal
  teable_internal:
    name: teable_internal
    internal: true
