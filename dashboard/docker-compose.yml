services:

# Portainer # --------------------------------------------------------------------------------------------------------------
  portainer:
    image: portainer/portainer-ce:lts
    container_name: portainer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer:/data
    restart: unless-stopped
    mem_limit: 512m
    cpus: "0.5"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer-router.rule=Host(`${PORTAINER_HOST}`)"
      - "traefik.http.routers.portainer-router.entrypoints=web"
      - "traefik.http.routers.portainer-router.middlewares=portainer-xfp@docker"
      - "traefik.http.middlewares.portainer-xfp.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.middlewares.portainer-xfp.headers.customrequestheaders.X-Forwarded-Port=443"
      - "traefik.http.services.portainer-service.loadbalancer.server.port=9000"
    networks:
      - proxy_public

# Grafana # --------------------------------------------------------------------------------------------------------------

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    user: "1000:1000"
    environment:
      # SMTP via Stalwart (rete mail_internal): 587 STARTTLS, il mailer di
      # Grafana non supporta il TLS implicito della 465.
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=${SMTP_HOST}:587
      - GF_SMTP_USER=${SMTP_NOREPLY_USER}
      - GF_SMTP_PASSWORD=${SMTP_NOREPLY_PASSWORD}
      - GF_SMTP_FROM_ADDRESS=${SMTP_NOREPLY_USER}
      - GF_SMTP_FROM_NAME=Grafana
      # SSO via Authentik (OIDC): match per email sull'account esistente
      # (ALLOW_INSECURE_EMAIL_LOOKUP), nessuna creazione automatica di utenti
      # (ALLOW_SIGN_UP=false) e ruoli gestiti in Grafana (SKIP_ORG_ROLE_SYNC).
      # Il lookup per email è sicuro SOLO finché Authentik resta senza
      # self-signup/enrollment e con email gestite dall'admin.
      - GF_SERVER_ROOT_URL=https://${GRAFANA_HOST}
      - GF_AUTH_GENERIC_OAUTH_ENABLED=true
      - GF_AUTH_GENERIC_OAUTH_NAME=Authentik
      - GF_AUTH_GENERIC_OAUTH_CLIENT_ID=${GRAFANA_OIDC_CLIENT_ID}
      - GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET=${GRAFANA_OIDC_CLIENT_SECRET}
      - GF_AUTH_GENERIC_OAUTH_SCOPES=openid profile email
      - GF_AUTH_GENERIC_OAUTH_AUTH_URL=https://${AUTHENTIK_HOST}/application/o/authorize/
      - GF_AUTH_GENERIC_OAUTH_TOKEN_URL=https://${AUTHENTIK_HOST}/application/o/token/
      - GF_AUTH_GENERIC_OAUTH_API_URL=https://${AUTHENTIK_HOST}/application/o/userinfo/
      - GF_AUTH_GENERIC_OAUTH_USE_PKCE=true
      - GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP=false
      - GF_AUTH_GENERIC_OAUTH_SKIP_ORG_ROLE_SYNC=true
      - GF_AUTH_OAUTH_ALLOW_INSECURE_EMAIL_LOOKUP=true
    volumes:
      - ./grafana:/var/lib/grafana  # Persists dashboards and users
    restart: unless-stopped
    mem_limit: 1g
    cpus: "1.0"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy_public"
      - "traefik.http.routers.grafana-router.rule=Host(`${GRAFANA_HOST}`)"
      - "traefik.http.routers.grafana-router.entrypoints=web"
      - "traefik.http.services.grafana-service.loadbalancer.server.port=3000"
    networks:
      - proxy_public
      - metrics_internal
      - mail_internal


# Monitoring & Metrics Docker # --------------------------------------------------------------------------------------------------------------

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    restart: unless-stopped
    mem_limit: 4g
    cpus: "2.0"
    networks:
      - proxy_public
      - metrics_internal


# Node Exporter # --------------------------------------------------------------------------------------------------------------

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    pid: host
    privileged: true
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:rw,rslave
      - /run/udev:/run/udev:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped
    mem_limit: 128m
    cpus: "0.25"
    networks:
      - proxy_public
      - metrics_internal

networks:
  proxy_public:
    external: true
  metrics_internal:
    external: true
  db_internal:
    external: true
  mail_internal:
    external: true