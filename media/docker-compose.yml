services:

# Plex # --------------------------------------------------------------------------------------------------------------
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    user: "1000:1000"
    runtime: nvidia
    environment:
      - TZ=Europe/Rome
      - VERSION=docker
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
      - ADVERTISE_IP=${PLEX_ADVERTISE_IP}
    ports:
      - "32400:32400"
    volumes:
      - ./plex:/config
      - ../../storage/movies:/movies
      - ../../storage/tv:/tv
      - ../../storage/private:/private
      - /dev/shm:/transcode
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    mem_limit: 4g
    cpus: "4.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:32400/identity"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - proxy_public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy_public"
      - "traefik.http.routers.plex-router.rule=Host(`plex.local`) || Host(`plex.example.com`)"
      - "traefik.http.routers.plex-router.entrypoints=web"
      - "traefik.http.services.plex-service.loadbalancer.server.port=32400"

# PlexSyncer # --------------------------------------------------------------------------------------------------------------
  plex-syncer:
    build: ./plex-syncer
    image: plex-syncer:latest
    container_name: plex-syncer
    user: "1000:1000"
    depends_on:
      - plex
    environment:
      - TZ=Europe/Rome
      - PLEX_URL=http://plex:32400
      - PLEX_TOKEN=${PLEX_TOKEN}
      - PLEX_LIBRARY=Private
      - PLEX_PRIVATE_ROOT=/private
      - SYNC_INTERVAL=3600
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=plex_info
      - POSTGRES_USER=plex_info
      - POSTGRES_PASSWORD=${DB_PLEX_INFO_PASSWORD}
    restart: unless-stopped
    mem_limit: 512m
    cpus: "0.5"
    networks:
      - proxy_public
      - db_internal

# Overseerr # --------------------------------------------------------------------------------------------------------------
  overseerr:
    image:  ghcr.io/seerr-team/seerr:latest
    container_name: overseerr
    user: "1000:1000"
    environment:
      - LOG_LEVEL=debug
      - TZ=Europe/Rome
    volumes:
      - ./overseerr:/app/config
    restart: unless-stopped
    mem_limit: 1g
    cpus: "0.75"
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.overseerr-router.rule=Host(`catalogo.local`)'
      - 'traefik.http.routers.overseerr-router.entrypoints=web'
      - 'traefik.http.services.overseerr-service.loadbalancer.server.port=5055'
    networks:
      - proxy_public

# Sonarr # --------------------------------------------------------------------------------------------------------------
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    user: "1000:1000"
    environment:
      - TZ=Europe/Rome
    volumes:
      - ./sonarr:/config
      - ../../storage/tv:/tv
      - ../../storage/downloads:/downloads
    restart: unless-stopped
    mem_limit: 1g
    cpus: "1.0"
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.sonarr-router.rule=Host(`sonarr.local`)'
      - 'traefik.http.routers.sonarr-router.entrypoints=web'
      - 'traefik.http.services.sonarr-service.loadbalancer.server.port=8989'
    networks:
      - proxy_public

# Radarr # --------------------------------------------------------------------------------------------------------------
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    user: "1000:1000"
    environment:
      - TZ=Europe/Rome
    volumes:
      - ./radarr:/config
      - ../../storage/movies:/movies
      - ../../storage/downloads:/downloads
    restart: unless-stopped
    mem_limit: 1g
    cpus: "1.0"
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.radarr-router.rule=Host(`radarr.local`)'
      - 'traefik.http.routers.radarr-router.entrypoints=web'
      - 'traefik.http.services.radarr-service.loadbalancer.server.port=7878'
    networks:
      - proxy_public

# qBittorrent # --------------------------------------------------------------------------------------------------------------
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    user: "1000:1000"
    environment:
      - TZ=Europe/Rome
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    volumes:
      - ./qbittorrent:/config
      - ../../storage/downloads:/downloads
      - ../../storage/movies:/movies
      - ../../storage/tv:/tv
      - ../../storage/private:/private
    restart: unless-stopped
    mem_limit: 2g
    cpus: "2.0"
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.qbittorrent-router.rule=Host(`torrent.local`)'
      - 'traefik.http.routers.qbittorrent-router.entrypoints=web'
      - 'traefik.http.services.qbittorrent-service.loadbalancer.server.port=8080'
    networks:
      - proxy_public

# Jackett # --------------------------------------------------------------------------------------------------------------
  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    user: "1000:1000"
    environment:
      - TZ=Europe/Rome
      - AUTO_UPDATE=true
    volumes:
      - ./jackett:/config
      - ../../storage/downloads:/downloads
    restart: unless-stopped
    mem_limit: 1g
    cpus: "1.0"
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.jackett-router.rule=Host(`jackett.local`)'
      - 'traefik.http.routers.jackett-router.entrypoints=web'
      - 'traefik.http.services.jackett-service.loadbalancer.server.port=9117'
    networks:
      - proxy_public

# Mathesar # --------------------------------------------------------------------------------------------------------------

  mathesar:
    image: mathesar/mathesar:latest
    container_name: mathesar
    environment:
      DOMAIN_NAME: ${MATHESAR_HOSTNAME}
      ALLOWED_HOSTS: "*"
      SECRET_KEY: ${MATHESAR_SECRET_KEY}
      POSTGRES_DB: mathesar
      POSTGRES_USER: mathesar
      POSTGRES_PASSWORD: ${DB_MATHESAR_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    volumes:
      - ./mathesar/static:/code/static
      - ./mathesar/media:/code/.media
      - ./mathesar/secrets:/code/.secrets
    restart: unless-stopped
    mem_limit: 1536m
    cpus: "1.5"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy_public"
      - "traefik.http.routers.mathesar-router.rule=Host(`${MATHESAR_HOSTNAME}`)"
      - "traefik.http.routers.mathesar-router.entrypoints=web"
      - "traefik.http.routers.mathesar-router.middlewares=mathesar-https@docker"
      - "traefik.http.middlewares.mathesar-https.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.services.mathesar-service.loadbalancer.server.port=8000"
    networks:
      - proxy_public
      - db_internal

networks:
  proxy_public:
    external: true
  db_internal:
    external: true